name: Deploy to Cloud Run

on:
  release:
    types: [published]

env:
  PROJECT_ID: resume-couturier-ai
  REGION: us-central1
  SERVICE_NAME: resume-couturier-ai-server
  GOOGLE_OAUTH_CLIENT_ID: 755081361679-9l37cku2v462o7ffbbeo5r4q2vompc27.apps.googleusercontent.com
  IMAGE: us-central1-docker.pkg.dev/resume-couturier-ai/cloud-run-images/resume-couturier-ai

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.event.release.tag_name }} -t ${{ env.IMAGE }}:latest ./server
          docker push ${{ env.IMAGE }}:${{ github.event.release.tag_name }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.event.release.tag_name }} \
            --region ${{ env.REGION }} \
            --min-instances 0 \
            --max-instances 10 \
            --allow-unauthenticated \
            --platform managed \
            --port 8000 \
            --set-env-vars GOOGLE_CLOUD_PROJECT_ID=${{ env.PROJECT_ID }},GOOGLE_OAUTH_CLIENT_ID=${{ env.GOOGLE_OAUTH_CLIENT_ID }}
