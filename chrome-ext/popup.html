<!doctype html>
<html>
  <head>
    <title>Resume Couturier AI</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        min-width: 320px;
        margin: 0;
        padding: 12px;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
        font-size: 13px;
        color: #1a1a1a;
      }
      h3 {
        margin: 0 0 8px 0;
        font-size: 16px;
        font-weight: 600;
      }
      p {
        margin: 0 0 12px 0;
        line-height: 1.4;
        color: #444;
      }
      button {
        padding: 8px 14px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #fff;
        font-size: 13px;
      }
      button.primary {
        width: 100%;
        margin-top: 12px;
        background: #1a73e8;
        color: #fff;
        border-color: #1557b0;
      }
      button.primary:hover:not(:disabled) {
        background: #1557b0;
      }
      button.primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #authSection,
      #mainSection {
        display: none;
      }
      #authSection.visible,
      #mainSection.visible {
        display: block;
      }
      .user-line {
        font-size: 12px;
        color: #555;
        margin-bottom: 10px;
        word-break: break-all;
      }
      .section-title {
        font-weight: 600;
        margin-bottom: 8px;
      }
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      .section {
        margin-bottom: 12px;
      }
      button.secondary {
        padding: 6px 10px;
        font-size: 12px;
      }
      .muted {
        font-size: 12px;
        color: #666;
      }
      .small {
        font-size: 12px;
      }
      label {
        display: block;
        margin: 8px 0 4px;
        font-size: 12px;
        color: #444;
      }
      select {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #fff;
        font-size: 13px;
      }
      #uploadSection,
      #templateSection {
        display: none;
      }
      #uploadSection.visible,
      #templateSection.visible {
        display: block;
      }
      #parseStatus {
        margin-top: 8px;
        min-height: 1.2em;
        font-size: 12px;
      }
      #templatesStatus {
        font-size: 12px;
        color: #666;
        margin-bottom: 8px;
        min-height: 1.2em;
      }
      #templatesList {
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
        padding-right: 2px;
      }
      .template-card {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
        background: #fafafa;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .template-card:hover {
        border-color: #bbb;
        background: #fff;
      }
      .template-card.selected {
        border-color: #1a73e8;
        background: #e8f0fe;
      }
      .template-card img {
        width: 56px;
        height: 72px;
        object-fit: cover;
        border-radius: 4px;
        background: #ddd;
        flex-shrink: 0;
        cursor: zoom-in;
      }
      .template-name {
        flex: 1;
        font-weight: 500;
        line-height: 1.3;
      }
      .template-thumb-fallback {
        width: 56px;
        height: 72px;
        flex-shrink: 0;
        border-radius: 4px;
        background: #e8e8e8;
        color: #666;
        font-size: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 4px;
      }
      .template-thumb-fallback--clickable {
        cursor: zoom-in;
      }
      #generationStatus {
        margin-top: 8px;
        min-height: 1.2em;
        font-size: 12px;
      }
      #resultSection {
        margin-top: 12px;
        padding: 10px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        background: #fafafa;
        display: none;
      }
      #resultSection.visible {
        display: block;
      }
      .result-actions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .result-actions button {
        flex: 1;
      }
      #keywordsTags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }
      .keyword-tag {
        background: #eef3ff;
        border: 1px solid #c9d7ff;
        color: #1d3b8b;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 11px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h3>Resume Couturier AI</h3>

    <div id="authSection" class="visible">
      <p>Upload your resume and get it scored by an AI.</p>
      <button type="button" id="loginBtn">Login with Google</button>
      <div
        id="authError"
        style="margin-top: 10px; font-size: 12px; color: #c5221f"
      ></div>
    </div>

    <div id="mainSection">
      <div class="user-line" id="userLine"></div>
      <div id="uploadSection" class="section">
        <div class="section-title">Upload your current resume</div>
        <p class="muted small">Supported formats: PDF, DOCX</p>
        <input type="file" id="resumeFileInput" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
        <button type="button" class="primary" id="parseBtn">Parse Resume</button>
        <div id="parseStatus"></div>
      </div>
      <div id="templateSection" class="section">
        <div class="section-header">
          <div class="section-title" style="margin-bottom: 0">Choose a template</div>
          <button type="button" class="secondary" id="backToUploadBtn">Back to Upload</button>
        </div>
        <label for="geminiModelSelect">Gemini model</label>
        <select id="geminiModelSelect">
          <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
          <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
          <option value="gemini-3.1-flash-lite-preview">gemini-3.1-flash-lite-preview</option>
          <option value="gemini-2.5-pro">gemini-2.5-pro</option>
          <option value="gemini-2.5-flash" selected>gemini-2.5-flash</option>
          <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
        </select>

        <div id="jobDescriptionContainer" style="margin-top: 12px; margin-bottom: 12px;">
          <div class="section-title" style="margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between;">
            <span>Detected job description</span>
            <span id="jdStatus" style="font-weight: normal; font-size: 11px; color: #666;"></span>
          </div>
          <textarea id="jobDescriptionText" placeholder="Extracting or paste job description here..." style="width: 100%; height: 80px; font-size: 13px; font-family: inherit; resize: vertical; padding: 6px; border: 1px solid #ccc; border-radius: 6px;"></textarea>
        </div>

        <div id="templatesStatus"></div>
        <div id="templatesList"></div>
        <button type="button" class="primary" id="tailorBtn" disabled>
          Tailor Resume
        </button>
        <div id="generationStatus"></div>
        <div id="resultSection">
          <div class="section-title" style="margin-bottom: 4px">Generated Resume</div>
          <div class="muted small">PDF is ready. You can preview or download it.</div>
          <div class="result-actions">
            <button type="button" id="previewPdfBtn">Preview PDF</button>
            <button type="button" id="downloadPdfBtn">Download PDF</button>
          </div>
          <div class="section-title" style="margin-top: 10px; margin-bottom: 4px">
            Missing Keywords
          </div>
          <div id="keywordsTags"></div>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
