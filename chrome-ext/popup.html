<!DOCTYPE html>
<html>
  <head>
    <title>Resume Couturier AI</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 320px;
        margin: 0;
        padding: 12px;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        font-size: 13px;
        color: #1a1a1a;
      }
      h3 {
        margin: 0 0 8px 0;
        font-size: 16px;
        font-weight: 600;
      }
      p {
        margin: 0 0 12px 0;
        line-height: 1.4;
        color: #444;
      }
      button {
        padding: 8px 14px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #fff;
        font-size: 13px;
      }
      button.primary {
        width: 100%;
        margin-top: 12px;
        background: #1a73e8;
        color: #fff;
        border-color: #1557b0;
      }
      button.primary:hover:not(:disabled) {
        background: #1557b0;
      }
      button.primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #authSection,
      #mainSection {
        display: none;
      }
      #authSection.visible,
      #mainSection.visible {
        display: block;
      }
      .user-line {
        font-size: 12px;
        color: #555;
        margin-bottom: 10px;
        word-break: break-all;
      }
      .section-title {
        font-weight: 600;
        margin-bottom: 8px;
      }
      #templatesStatus {
        font-size: 12px;
        color: #666;
        margin-bottom: 8px;
        min-height: 1.2em;
      }
      #templatesList {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 280px;
        overflow-y: auto;
        padding-right: 2px;
      }
      .template-card {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
        background: #fafafa;
        transition: border-color 0.15s, background 0.15s;
      }
      .template-card:hover {
        border-color: #bbb;
        background: #fff;
      }
      .template-card.selected {
        border-color: #1a73e8;
        background: #e8f0fe;
      }
      .template-card img {
        width: 56px;
        height: 72px;
        object-fit: cover;
        border-radius: 4px;
        background: #ddd;
        flex-shrink: 0;
        cursor: zoom-in;
      }
      .template-name {
        flex: 1;
        font-weight: 500;
        line-height: 1.3;
      }
      .template-thumb-fallback {
        width: 56px;
        height: 72px;
        flex-shrink: 0;
        border-radius: 4px;
        background: #e8e8e8;
        color: #666;
        font-size: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 4px;
      }
      .template-thumb-fallback--clickable {
        cursor: zoom-in;
      }
    </style>
  </head>
  <body>
    <h3>Resume Couturier AI</h3>

    <div id="authSection" class="visible">
      <p>Upload your resume and get it scored by an AI.</p>
      <button type="button" id="loginBtn">Login with Google</button>
      <div id="authError" style="margin-top: 10px; font-size: 12px; color: #c5221f;"></div>
    </div>

    <div id="mainSection">
      <div class="user-line" id="userLine"></div>
      <div class="section-title">Choose a template</div>
      <div id="templatesStatus"></div>
      <div id="templatesList"></div>
      <button type="button" class="primary" id="tailorBtn" disabled>Tailor Resume</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
